name: "developer_build"

on:
  workflow_dispatch:
    inputs:
      developer_name:
        description: "Tên developer, ví dụ: linh"
        required: true
        default: "linh"

      deploy_count:
        description: "Muốn deploy bao nhiêu service?"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"

      ssh_user:
        description: "SSH user developer dùng để tunnel"
        required: true
        default: "dev"

      ssh_host:
        description: "Public IP/domain của VPS"
        required: true
        default: "34.142.231.72"

      slot1_service:
        description: "Service #1"
        required: true
        default: "tax"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot1_mode:
        description: "Service #1 deploy mode"
        required: true
        default: "branch"
        type: choice
        options:
          - latest
          - branch
          - none
      slot1_branch:
        description: "Service #1 branch nếu mode = branch"
        required: true
        default: "dev_tax_service"

      slot2_service:
        description: "Service #2"
        required: true
        default: "product"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot2_mode:
        description: "Service #2 deploy mode"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - branch
          - none
      slot2_branch:
        description: "Service #2 branch nếu mode = branch"
        required: true
        default: "main"

      slot3_service:
        description: "Service #3"
        required: true
        default: "storefront-ui"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot3_mode:
        description: "Service #3 deploy mode"
        required: true
        default: "none"
        type: choice
        options:
          - latest
          - branch
          - none
      slot3_branch:
        description: "Service #3 branch nếu mode = branch"
        required: true
        default: "main"

      slot4_service:
        description: "Service #4"
        required: true
        default: "tax"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot4_mode:
        description: "Service #4 deploy mode"
        required: true
        default: "none"
        type: choice
        options:
          - latest
          - branch
          - none
      slot4_branch:
        description: "Service #4 branch nếu mode = branch"
        required: true
        default: "main"

      slot5_service:
        description: "Service #5"
        required: true
        default: "product"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot5_mode:
        description: "Service #5 deploy mode"
        required: true
        default: "none"
        type: choice
        options:
          - latest
          - branch
          - none
      slot5_branch:
        description: "Service #5 branch nếu mode = branch"
        required: true
        default: "main"

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  bootstrap:
    name: Prepare developer namespace
    runs-on: self-hosted

    steps:
      - name: Prepare namespace
        shell: bash
        run: |
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          NS="dev-${DEV_NAME}"

          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -

          echo "NAMESPACE=$NS" >> "$GITHUB_ENV"

      - name: Copy shared config and secrets to developer namespace
        shell: bash
        run: |
          echo "Copy shared ConfigMap and Secret from dev to $NAMESPACE"

          kubectl get configmap yas-configuration-configmap -n dev -o yaml \
            | sed "s/namespace: dev/namespace: $NAMESPACE/" \
            | kubectl apply -n "$NAMESPACE" -f -

          kubectl get secret yas-postgresql-credentials-secret -n dev -o yaml \
            | sed "s/namespace: dev/namespace: $NAMESPACE/" \
            | kubectl apply -n "$NAMESPACE" -f -

  deploy:
    name: Deploy selected service slot ${{ matrix.slot }}
    needs: bootstrap
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        slot: [1, 2, 3, 4, 5]

    steps:
      - name: Select service slot
        shell: bash
        run: |
          SLOT="${{ matrix.slot }}"
          DEPLOY_COUNT="${{ github.event.inputs.deploy_count }}"

          if [ "$SLOT" -gt "$DEPLOY_COUNT" ]; then
            echo "Slot $SLOT is greater than deploy_count=$DEPLOY_COUNT. Skip."
            echo "SKIP_SLOT=true" >> "$GITHUB_ENV"
            exit 0
          fi

          case "$SLOT" in
            1)
              SERVICE="${{ github.event.inputs.slot1_service }}"
              MODE="${{ github.event.inputs.slot1_mode }}"
              BRANCH="${{ github.event.inputs.slot1_branch }}"
              ;;
            2)
              SERVICE="${{ github.event.inputs.slot2_service }}"
              MODE="${{ github.event.inputs.slot2_mode }}"
              BRANCH="${{ github.event.inputs.slot2_branch }}"
              ;;
            3)
              SERVICE="${{ github.event.inputs.slot3_service }}"
              MODE="${{ github.event.inputs.slot3_mode }}"
              BRANCH="${{ github.event.inputs.slot3_branch }}"
              ;;
            4)
              SERVICE="${{ github.event.inputs.slot4_service }}"
              MODE="${{ github.event.inputs.slot4_mode }}"
              BRANCH="${{ github.event.inputs.slot4_branch }}"
              ;;
            5)
              SERVICE="${{ github.event.inputs.slot5_service }}"
              MODE="${{ github.event.inputs.slot5_mode }}"
              BRANCH="${{ github.event.inputs.slot5_branch }}"
              ;;
            *)
              echo "Unknown slot: $SLOT"
              exit 1
              ;;
          esac

          if [ "$MODE" = "none" ]; then
            echo "Slot $SLOT selected mode=none. Skip deploy."
            echo "SKIP_SLOT=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "SKIP_SLOT=false" >> "$GITHUB_ENV"
          echo "SERVICE=$SERVICE" >> "$GITHUB_ENV"
          echo "DEPLOY_MODE=$MODE" >> "$GITHUB_ENV"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

          echo "Selected slot $SLOT: service=$SERVICE mode=$MODE branch=$BRANCH"

      - name: Checkout source code
        if: env.SKIP_SLOT != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve service config
        if: env.SKIP_SLOT != 'true'
        id: config
        shell: bash
        run: |
          SERVICE="$SERVICE"

          case "$SERVICE" in
            tax)
              echo "chart=tax" >> "$GITHUB_OUTPUT"
              echo "image_name=yas-tax" >> "$GITHUB_OUTPUT"
              echo "image_key=backend" >> "$GITHUB_OUTPUT"
              echo "path=/tax" >> "$GITHUB_OUTPUT"
              ;;

            product)
              echo "chart=product" >> "$GITHUB_OUTPUT"
              echo "image_name=yas-product" >> "$GITHUB_OUTPUT"
              echo "image_key=backend" >> "$GITHUB_OUTPUT"
              echo "path=/product" >> "$GITHUB_OUTPUT"
              ;;

            storefront-ui)
              echo "chart=storefront-ui" >> "$GITHUB_OUTPUT"
              echo "image_name=yas-storefront" >> "$GITHUB_OUTPUT"
              echo "image_key=ui" >> "$GITHUB_OUTPUT"
              echo "path=/" >> "$GITHUB_OUTPUT"
              ;;

            *)
              echo "Unknown service: $SERVICE"
              exit 1
              ;;
          esac

      - name: Resolve branch commit SHA
        if: env.SKIP_SLOT != 'true'
        id: tag
        shell: bash
        run: |
          BRANCH="$BRANCH"

          if [ "$DEPLOY_MODE" = "latest" ]; then
            SHORT_SHA="latest"
            echo "Using latest image tag for service $SERVICE"
          else
            git fetch origin "$BRANCH" --depth=1
            SHORT_SHA="$(git rev-parse --short=7 origin/$BRANCH)"
            echo "Branch $BRANCH commit SHA: $SHORT_SHA"
          fi

          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Check image exists on Docker Hub
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          IMAGE="docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ steps.config.outputs.image_name }}"
          TAG="${{ steps.tag.outputs.short_sha }}"

          echo "Checking image: $IMAGE:$TAG"

          docker manifest inspect "$IMAGE:$TAG" > /dev/null || {
            echo "Image $IMAGE:$TAG chưa tồn tại."
            echo "Hãy push code lên branch để workflow 03 CI build image chạy trước."
            exit 1
          }

      - name: Prepare namespace
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          NS="dev-${DEV_NAME}"

          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -

          echo "NAMESPACE=$NS" >> "$GITHUB_ENV"

      - name: Build Helm chart dependencies
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          CHART="${{ steps.config.outputs.chart }}"

          echo "Building dependencies for chart: k8s/charts/$CHART"

          helm dependency update "k8s/charts/$CHART"
          helm dependency build "k8s/charts/$CHART"

          echo "Chart dependencies:"
          ls -la "k8s/charts/$CHART/charts" || true

      - name: Deploy service by Helm
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          SERVICE="$SERVICE"
          CHART="${{ steps.config.outputs.chart }}"
          IMAGE_KEY="${{ steps.config.outputs.image_key }}"
          IMAGE="docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ steps.config.outputs.image_name }}"
          TAG="${{ steps.tag.outputs.short_sha }}"
          RELEASE="developer-${DEV_NAME}-${SERVICE}"

          HOST="${SERVICE}-${DEV_NAME}.dev.local.com"

          echo "Deploying:"
          echo "  namespace = $NAMESPACE"
          echo "  release   = $RELEASE"
          echo "  chart     = $CHART"
          echo "  image     = $IMAGE:$TAG"
          echo "  host      = $HOST"

          helm upgrade --install "$RELEASE" "k8s/charts/$CHART" \
          -n "$NAMESPACE" \
          -f "k8s/charts/$CHART/values.yaml" \
          --set "${IMAGE_KEY}.image.repository=$IMAGE" \
          --set "${IMAGE_KEY}.image.tag=$TAG" \
          --set "${IMAGE_KEY}.service.type=NodePort" \
          --set "${IMAGE_KEY}.resources.requests.cpu=0" \
          --set "${IMAGE_KEY}.resources.requests.memory=64Mi" \
          --set "${IMAGE_KEY}.resources.limits.cpu=300m" \
          --set "${IMAGE_KEY}.resources.limits.memory=512Mi" \
          --set "${IMAGE_KEY}.livenessProbe.initialDelaySeconds=240" \
          --set "${IMAGE_KEY}.readinessProbe.initialDelaySeconds=240" \
          --set "${IMAGE_KEY}.ingress.enabled=true" \
          --set "${IMAGE_KEY}.ingress.host=$HOST" \
          --wait \
          --timeout 20m

      - name: Show result
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          echo "Namespace: $NAMESPACE"

          echo ""
          echo "Pods:"
          kubectl get pods -n "$NAMESPACE"

          echo ""
          echo "Services:"
          kubectl get svc -n "$NAMESPACE"

          echo ""
          echo "Ingress:"
          kubectl get ingress -n "$NAMESPACE" || true

          echo ""
          echo "Access host:"
          echo "$SERVICE-${{ github.event.inputs.developer_name }}.dev.local.com"

      - name: Show developer access information
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          SERVICE="$SERVICE"
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          HOST="${SERVICE}-${DEV_NAME}.dev.local.com"

          NODE_IP="$(minikube ip)"
          NODE_PORT="$(kubectl get svc "$SERVICE" -n "$NAMESPACE" -o jsonpath='{.spec.ports[?(@.port==80)].nodePort}')"
          APP_PATH="${{ steps.config.outputs.path }}"
          SSH_USER="${{ github.event.inputs.ssh_user }}"
          SSH_HOST="${{ github.event.inputs.ssh_host }}"

          echo "Developer access:"
          echo "  Service: $SERVICE"
          echo "  Host: $HOST"
          echo "  Node IP: $NODE_IP"
          echo "  NodePort: $NODE_PORT"
          echo ""
          echo "SSH tunnel command for developer:"
          echo "  ssh -N -L $NODE_PORT:$NODE_IP:$NODE_PORT $SSH_USER@$SSH_HOST"
          echo ""
          echo "Add to /etc/hosts on developer machine:"
          echo "  127.0.0.1 $HOST"
          echo ""
          echo "Open after adding hosts file:"
          echo "  http://$HOST:$NODE_PORT$APP_PATH"
