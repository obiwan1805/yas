name: "developer_build"

on:
  workflow_dispatch:
    inputs:
      developer_name:
        description: "Tên developer, ví dụ: linh"
        required: true
        default: "linh"

      deploy_count:
        description: "Muốn deploy bao nhiêu service?"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"

      ssh_user:
        description: "SSH user developer dùng để tunnel"
        required: true
        default: "dev"

      ssh_host:
        description: "Public IP/domain của VPS"
        required: true
        default: "34.142.231.72"

      slot1_service:
        description: "Service #1"
        required: true
        default: "tax"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot1_mode:
        description: "Service #1 deploy mode"
        required: true
        default: "branch"
        type: choice
        options:
          - latest
          - branch
          - none
      slot1_branch:
        description: "Service #1 branch nếu mode = branch"
        required: true
        default: "dev_tax_service"

      slot2_service:
        description: "Service #2"
        required: true
        default: "product"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot2_mode:
        description: "Service #2 deploy mode"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - branch
          - none
      slot2_branch:
        description: "Service #2 branch nếu mode = branch"
        required: true
        default: "main"

      slot3_service:
        description: "Service #3"
        required: true
        default: "storefront-ui"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot3_mode:
        description: "Service #3 deploy mode"
        required: true
        default: "none"
        type: choice
        options:
          - latest
          - branch
          - none
      slot3_branch:
        description: "Service #3 branch nếu mode = branch"
        required: true
        default: "main"

      slot4_service:
        description: "Service #4"
        required: true
        default: "tax"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot4_mode:
        description: "Service #4 deploy mode"
        required: true
        default: "none"
        type: choice
        options:
          - latest
          - branch
          - none
      slot4_branch:
        description: "Service #4 branch nếu mode = branch"
        required: true
        default: "main"

      slot5_service:
        description: "Service #5"
        required: true
        default: "product"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
      slot5_mode:
        description: "Service #5 deploy mode"
        required: true
        default: "none"
        type: choice
        options:
          - latest
          - branch
          - none
      slot5_branch:
        description: "Service #5 branch nếu mode = branch"
        required: true
        default: "main"

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  bootstrap:
    name: Prepare developer namespace
    runs-on: self-hosted

    steps:
      - name: Prepare namespace
        shell: bash
        run: |
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          NS="dev-${DEV_NAME}"

          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -

          echo "NAMESPACE=$NS" >> "$GITHUB_ENV"

      - name: Copy shared config and secrets to developer namespace
        shell: bash
        run: |
          echo "Copy shared ConfigMaps and Secrets from dev to $NAMESPACE"

          kubectl get configmap -n dev -o json \
            | jq '{
                apiVersion: "v1",
                kind: "List",
                items: [
                  .items[]
                  | select(.metadata.name != "kube-root-ca.crt")
                  | del(
                      .metadata.uid,
                      .metadata.resourceVersion,
                      .metadata.creationTimestamp,
                      .metadata.managedFields,
                      .metadata.annotations."kubectl.kubernetes.io/last-applied-configuration"
                    )
                  | .metadata.namespace = env.NAMESPACE
                ]
              }' \
            | kubectl apply -f -

          kubectl get secret -n dev -o json \
            | jq '{
                apiVersion: "v1",
                kind: "List",
                items: [
                  .items[]
                  | select(.type != "kubernetes.io/service-account-token")
                  | del(
                      .metadata.uid,
                      .metadata.resourceVersion,
                      .metadata.creationTimestamp,
                      .metadata.managedFields,
                      .metadata.annotations."kubectl.kubernetes.io/last-applied-configuration"
                    )
                  | .metadata.namespace = env.NAMESPACE
                ]
              }' \
            | kubectl apply -f -

  deploy:
    name: Deploy selected service slot ${{ matrix.slot }}
    needs: bootstrap
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        slot: [1, 2, 3, 4, 5]

    steps:
      - name: Select service slot
        shell: bash
        run: |
          SLOT="${{ matrix.slot }}"
          DEPLOY_COUNT="${{ github.event.inputs.deploy_count }}"

          if [ "$SLOT" -gt "$DEPLOY_COUNT" ]; then
            echo "Slot $SLOT is greater than deploy_count=$DEPLOY_COUNT. Skip."
            echo "SKIP_SLOT=true" >> "$GITHUB_ENV"
            exit 0
          fi

          case "$SLOT" in
            1)
              SERVICE="${{ github.event.inputs.slot1_service }}"
              MODE="${{ github.event.inputs.slot1_mode }}"
              BRANCH="${{ github.event.inputs.slot1_branch }}"
              ;;
            2)
              SERVICE="${{ github.event.inputs.slot2_service }}"
              MODE="${{ github.event.inputs.slot2_mode }}"
              BRANCH="${{ github.event.inputs.slot2_branch }}"
              ;;
            3)
              SERVICE="${{ github.event.inputs.slot3_service }}"
              MODE="${{ github.event.inputs.slot3_mode }}"
              BRANCH="${{ github.event.inputs.slot3_branch }}"
              ;;
            4)
              SERVICE="${{ github.event.inputs.slot4_service }}"
              MODE="${{ github.event.inputs.slot4_mode }}"
              BRANCH="${{ github.event.inputs.slot4_branch }}"
              ;;
            5)
              SERVICE="${{ github.event.inputs.slot5_service }}"
              MODE="${{ github.event.inputs.slot5_mode }}"
              BRANCH="${{ github.event.inputs.slot5_branch }}"
              ;;
            *)
              echo "Unknown slot: $SLOT"
              exit 1
              ;;
          esac

          if [ "$MODE" = "none" ]; then
            echo "Slot $SLOT selected mode=none. Skip deploy."
            echo "SKIP_SLOT=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "SKIP_SLOT=false" >> "$GITHUB_ENV"
          echo "SERVICE=$SERVICE" >> "$GITHUB_ENV"
          echo "DEPLOY_MODE=$MODE" >> "$GITHUB_ENV"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

          echo "Selected slot $SLOT: service=$SERVICE mode=$MODE branch=$BRANCH"

      - name: Checkout source code
        if: env.SKIP_SLOT != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve service config
        if: env.SKIP_SLOT != 'true'
        id: config
        shell: bash
        run: |
          SERVICE="$SERVICE"

          case "$SERVICE" in
            tax)
              echo "chart=tax" >> "$GITHUB_OUTPUT"
              echo "image_name=yas-tax" >> "$GITHUB_OUTPUT"
              echo "image_key=backend" >> "$GITHUB_OUTPUT"
              echo "path=/tax" >> "$GITHUB_OUTPUT"
              ;;

            product)
              echo "chart=product" >> "$GITHUB_OUTPUT"
              echo "image_name=yas-product" >> "$GITHUB_OUTPUT"
              echo "image_key=backend" >> "$GITHUB_OUTPUT"
              echo "path=/product" >> "$GITHUB_OUTPUT"
              ;;

            storefront-ui)
              echo "chart=storefront-ui" >> "$GITHUB_OUTPUT"
              echo "image_name=yas-storefront" >> "$GITHUB_OUTPUT"
              echo "image_key=ui" >> "$GITHUB_OUTPUT"
              echo "path=/" >> "$GITHUB_OUTPUT"
              ;;

            *)
              echo "Unknown service: $SERVICE"
              exit 1
              ;;
          esac

      - name: Resolve branch commit SHA
        if: env.SKIP_SLOT != 'true'
        id: tag
        shell: bash
        run: |
          BRANCH="$BRANCH"

          if [ "$DEPLOY_MODE" = "latest" ]; then
            SHORT_SHA="latest"
            echo "Using latest image tag for service $SERVICE"
          else
            git fetch origin "$BRANCH" --depth=1
            SHORT_SHA="$(git rev-parse --short=7 origin/$BRANCH)"
            echo "Branch $BRANCH commit SHA: $SHORT_SHA"
          fi

          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Check image exists on Docker Hub
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          IMAGE="docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ steps.config.outputs.image_name }}"
          TAG="${{ steps.tag.outputs.short_sha }}"

          echo "Checking image: $IMAGE:$TAG"

          docker manifest inspect "$IMAGE:$TAG" > /dev/null || {
            echo "Image $IMAGE:$TAG chưa tồn tại."
            echo "Hãy push code lên branch để workflow 03 CI build image chạy trước."
            exit 1
          }

      - name: Prepare namespace
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          NS="dev-${DEV_NAME}"

          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -

          echo "NAMESPACE=$NS" >> "$GITHUB_ENV"

      - name: Build Helm chart dependencies
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          CHART="${{ steps.config.outputs.chart }}"

          echo "Building dependencies for chart: k8s/charts/$CHART"

          helm dependency update "k8s/charts/$CHART"
          helm dependency build "k8s/charts/$CHART"

          echo "Chart dependencies:"
          ls -la "k8s/charts/$CHART/charts" || true

      - name: Deploy service by Helm
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          SERVICE="$SERVICE"
          CHART="${{ steps.config.outputs.chart }}"
          IMAGE_KEY="${{ steps.config.outputs.image_key }}"
          IMAGE="docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ steps.config.outputs.image_name }}"
          TAG="${{ steps.tag.outputs.short_sha }}"
          RELEASE="developer-${DEV_NAME}-${SERVICE}"

          HOST="${SERVICE}-${DEV_NAME}.dev.local.com"

          echo "Deploying:"
          echo "  namespace = $NAMESPACE"
          echo "  release   = $RELEASE"
          echo "  chart     = $CHART"
          echo "  image     = $IMAGE:$TAG"
          echo "  host      = $HOST"

          helm upgrade --install "$RELEASE" "k8s/charts/$CHART" \
          -n "$NAMESPACE" \
          -f "k8s/charts/$CHART/values.yaml" \
          --set "${IMAGE_KEY}.image.repository=$IMAGE" \
          --set "${IMAGE_KEY}.image.tag=$TAG" \
          --set "${IMAGE_KEY}.service.type=NodePort" \
          --set "${IMAGE_KEY}.resources.requests.cpu=0" \
          --set "${IMAGE_KEY}.resources.requests.memory=64Mi" \
          --set "${IMAGE_KEY}.resources.limits.cpu=300m" \
          --set "${IMAGE_KEY}.resources.limits.memory=512Mi" \
          --set "${IMAGE_KEY}.livenessProbe.initialDelaySeconds=240" \
          --set "${IMAGE_KEY}.readinessProbe.initialDelaySeconds=240" \
          --set "${IMAGE_KEY}.ingress.enabled=true" \
          --set "${IMAGE_KEY}.ingress.host=$HOST" \
          --wait \
          --timeout 20m

      - name: Show result
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          echo "Namespace: $NAMESPACE"

          echo ""
          echo "Pods:"
          kubectl get pods -n "$NAMESPACE"

          echo ""
          echo "Services:"
          kubectl get svc -n "$NAMESPACE"

          echo ""
          echo "Ingress:"
          kubectl get ingress -n "$NAMESPACE" || true

          echo ""
          echo "Access host:"
          echo "$SERVICE-${{ github.event.inputs.developer_name }}.dev.local.com"

      - name: Expose NodePort publicly and show developer access information
        if: env.SKIP_SLOT != 'true'
        shell: bash
        run: |
          SERVICE="$SERVICE"
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          HOST="${SERVICE}-${DEV_NAME}.dev.local.com"

          NODE_IP="$(minikube ip)"
          NODE_PORT="$(kubectl get svc "$SERVICE" -n "$NAMESPACE" -o jsonpath='{.spec.ports[?(@.port==80)].nodePort}')"
          APP_PATH="${{ steps.config.outputs.path }}"

          # Reuse ssh_host input as the public host/IP of the VPS.
          PUBLIC_HOST="${{ github.event.inputs.ssh_host }}"

          if [ -z "$NODE_PORT" ]; then
            echo "Cannot resolve NodePort for service $SERVICE in namespace $NAMESPACE"
            kubectl get svc "$SERVICE" -n "$NAMESPACE" -o wide || true
            exit 1
          fi

          if ! command -v socat >/dev/null 2>&1; then
            echo "socat is not installed on VPS. Install once with:"
            echo "  sudo apt update && sudo apt install -y socat"
            exit 1
          fi

          mkdir -p /tmp/yas-nodeport-public
          PID_FILE="/tmp/yas-nodeport-public/${NAMESPACE}-${SERVICE}-${NODE_PORT}.pid"
          LOG_FILE="/tmp/yas-nodeport-public/${NAMESPACE}-${SERVICE}-${NODE_PORT}.log"

          # Stop old forwarding process for the same service/port if it exists.
          if [ -f "$PID_FILE" ]; then
            OLD_PID="$(cat "$PID_FILE" || true)"
            if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" >/dev/null 2>&1; then
              echo "Stopping old socat process PID=$OLD_PID for $SERVICE:$NODE_PORT"
              kill "$OLD_PID" || true
            fi
            rm -f "$PID_FILE"
          fi

          # If a previous socat is still listening on this port, stop it best-effort.
          pkill -f "socat TCP-LISTEN:${NODE_PORT}" || true

          # Start public forward on VPS public interface:
          #   PUBLIC_HOST:NODE_PORT -> MINIKUBE_IP:NODE_PORT
          # Unset RUNNER_TRACKING_ID so GitHub Actions does not kill this background process after job ends.
          env -u RUNNER_TRACKING_ID nohup socat \
            TCP-LISTEN:${NODE_PORT},fork,reuseaddr \
            TCP:${NODE_IP}:${NODE_PORT} \
            > "$LOG_FILE" 2>&1 &

          SOCAT_PID="$!"
          echo "$SOCAT_PID" > "$PID_FILE"

          sleep 1

          if ! kill -0 "$SOCAT_PID" >/dev/null 2>&1; then
            echo "Failed to start socat for $SERVICE. Log:"
            cat "$LOG_FILE" || true
            exit 1
          fi

          PUBLIC_URL="http://${PUBLIC_HOST}:${NODE_PORT}${APP_PATH}"
          DOMAIN_URL="http://${HOST}:${NODE_PORT}${APP_PATH}"

          echo "Developer public access:"
          echo "  Service: $SERVICE"
          echo "  Namespace: $NAMESPACE"
          echo "  Node IP: $NODE_IP"
          echo "  NodePort: $NODE_PORT"
          echo "  Public host: $PUBLIC_HOST"
          echo "  Socat PID: $SOCAT_PID"
          echo ""
          echo "Public URL without hosts file:"
          echo "  $PUBLIC_URL"
          echo ""
          echo "If teacher wants domain:port, add this to /etc/hosts or Windows hosts file:"
          echo "  $PUBLIC_HOST $HOST"
          echo ""
          echo "Open after adding hosts file:"
          echo "  $DOMAIN_URL"
          echo ""
          echo "Make sure VPS/cloud firewall allows TCP port $NODE_PORT"

          {
            echo "### Public access for $SERVICE"
            echo ""
            echo "**Public URL without hosts file:**"
            echo "\`\`\`"
            echo "$PUBLIC_URL"
            echo "\`\`\`"
            echo ""
            echo "**Add to /etc/hosts or Windows hosts file if domain:port is required:**"
            echo "\`\`\`"
            echo "$PUBLIC_HOST $HOST"
            echo "\`\`\`"
            echo ""
            echo "**Open after adding hosts:**"
            echo "\`\`\`"
            echo "$DOMAIN_URL"
            echo "\`\`\`"
            echo ""
            echo "**Public forwarding process on VPS:**"
            echo "\`\`\`"
            echo "nohup socat TCP-LISTEN:${NODE_PORT},fork,reuseaddr TCP:${NODE_IP}:${NODE_PORT} > $LOG_FILE 2>&1 &"
            echo "\`\`\`"
            echo ""
            echo "Remember to open TCP port \`$NODE_PORT\` in the cloud firewall."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
