name: "developer_cleanup"

on:
  workflow_dispatch:
    inputs:
      developer_name:
        description: "Tên developer cần cleanup"
        required: true
        default: "linh"

      service:
        description: "Service cần xóa"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - tax
          - product
          - storefront-ui

      delete_namespace:
        description: "Xóa luôn namespace nếu service = all?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  cleanup:
    name: Cleanup developer environment
    runs-on: self-hosted

    steps:
      - name: Cleanup public NodePort forwarding processes
        shell: bash
        run: |
          set +e

          DEV_NAME="${{ github.event.inputs.developer_name }}"
          SERVICE="${{ github.event.inputs.service }}"
          NS="dev-${DEV_NAME}"
          PID_DIR="/tmp/yas-nodeport-public"

          echo "Cleanup socat forwarding processes"
          echo "Namespace: $NS"
          echo "Service: $SERVICE"
          echo "PID directory: $PID_DIR"

          cleanup_pid_file() {
            PID_FILE="$1"

            [ -f "$PID_FILE" ] || return 0

            PID="$(cat "$PID_FILE" 2>/dev/null || true)"
            LOG_FILE="${PID_FILE%.pid}.log"

            echo "Found PID file: $PID_FILE"
            echo "PID: $PID"

            if [ -n "$PID" ] && kill -0 "$PID" >/dev/null 2>&1; then
              echo "Stopping socat process PID=$PID"
              kill "$PID" || true
              sleep 1

              if kill -0 "$PID" >/dev/null 2>&1; then
                echo "Process PID=$PID still alive, force killing"
                kill -9 "$PID" || true
              fi
            else
              echo "PID is empty or process is not running"
            fi

            rm -f "$PID_FILE" "$LOG_FILE"
          }

          cleanup_service_forwarding() {
            TARGET_SERVICE="$1"

            echo ""
            echo "Cleanup forwarding for service: $TARGET_SERVICE"

            # Preferred cleanup path: use PID files created by developer_build.
            for PID_FILE in "$PID_DIR"/"${NS}-${TARGET_SERVICE}-"*.pid; do
              cleanup_pid_file "$PID_FILE"
            done

            # Fallback cleanup path: if Kubernetes Service still exists, resolve NodePort and kill matching socat.
            NODE_PORT="$(kubectl get svc "$TARGET_SERVICE" -n "$NS" -o jsonpath='{.spec.ports[?(@.port==80)].nodePort}' 2>/dev/null || true)"

            if [ -n "$NODE_PORT" ]; then
              echo "Fallback cleanup by NodePort: $NODE_PORT"
              pkill -f "socat TCP-LISTEN:${NODE_PORT}" || true
            else
              echo "No NodePort found for $TARGET_SERVICE in $NS"
            fi
          }

          if [ "$SERVICE" = "all" ]; then
            cleanup_service_forwarding "tax"
            cleanup_service_forwarding "product"
            cleanup_service_forwarding "storefront-ui"

            # Extra safety: remove any remaining PID files for this namespace.
            for PID_FILE in "$PID_DIR"/"${NS}-"*.pid; do
              cleanup_pid_file "$PID_FILE"
            done
          else
            cleanup_service_forwarding "$SERVICE"
          fi

          echo ""
          echo "Remaining forwarding files:"
          ls -la "$PID_DIR" 2>/dev/null || true

      - name: Cleanup Helm release
        shell: bash
        run: |
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          SERVICE="${{ github.event.inputs.service }}"
          NS="dev-${DEV_NAME}"

          echo "Namespace: $NS"
          echo "Service: $SERVICE"

          if [ "$SERVICE" = "all" ]; then
            helm uninstall "developer-${DEV_NAME}-tax" -n "$NS" || true
            helm uninstall "developer-${DEV_NAME}-product" -n "$NS" || true
            helm uninstall "developer-${DEV_NAME}-storefront-ui" -n "$NS" || true
          else
            helm uninstall "developer-${DEV_NAME}-${SERVICE}" -n "$NS" || true
          fi

      - name: Delete namespace
        if: github.event.inputs.service == 'all' && github.event.inputs.delete_namespace == 'true'
        shell: bash
        run: |
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          NS="dev-${DEV_NAME}"

          kubectl delete namespace "$NS" --ignore-not-found=true

      - name: Verify cleanup
        shell: bash
        run: |
          DEV_NAME="${{ github.event.inputs.developer_name }}"
          NS="dev-${DEV_NAME}"

          kubectl get ns "$NS" || true
          kubectl get pods -n "$NS" || true
