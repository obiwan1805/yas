name: "03 CI - Build Docker image by branch"

on:
  push:
    branches:
      - "**"
    paths:
      - "tax/**"
      - "product/**"
      - "storefront/**"
      - ".github/workflows/ci-build-image.yml"

  workflow_dispatch:
    inputs:
      service:
        description: "Service cần build"
        required: true
        default: "tax"
        type: choice
        options:
          - tax
          - product
          - storefront-ui
          - all

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: tax
            source_dir: tax
            image_name: yas-tax
            build_type: maven

          - service: product
            source_dir: product
            image_name: yas-product
            build_type: maven

          - service: storefront-ui
            source_dir: storefront
            image_name: yas-storefront
            build_type: node

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Decide whether to build this service
        id: decide
        shell: bash
        run: |
          SHOULD_BUILD="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_SERVICE="${{ github.event.inputs.service }}"
            if [ "$INPUT_SERVICE" = "all" ] || [ "$INPUT_SERVICE" = "${{ matrix.service }}" ]; then
              SHOULD_BUILD="true"
            fi
          else
            CHANGED_FILES="$(git diff --name-only HEAD~1 HEAD || true)"
            echo "$CHANGED_FILES"

            if echo "$CHANGED_FILES" | grep -q "^${{ matrix.source_dir }}/"; then
              SHOULD_BUILD="true"
            fi
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "Should build ${{ matrix.service }}: $SHOULD_BUILD"

      - name: Set up JDK 21
        if: steps.decide.outputs.should_build == 'true' && matrix.build_type == 'maven'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Maven service
        if: steps.decide.outputs.should_build == 'true' && matrix.build_type == 'maven'
        shell: bash
        run: |
          mvn -B clean package -pl ${{ matrix.source_dir }} -am -DskipTests

      - name: Calculate image tag
        if: steps.decide.outputs.should_build == 'true'
        id: vars
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Image tag: $SHORT_SHA"

      - name: Login to Docker Hub
        if: steps.decide.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        if: steps.decide.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.source_dir }}
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image_name }}:${{ steps.vars.outputs.short_sha }}

      - name: Push main/latest tags
        if: steps.decide.outputs.should_build == 'true' && github.ref_name == 'main'
        shell: bash
        run: |
          IMAGE="docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image_name }}"
          TAG="${{ steps.vars.outputs.short_sha }}"

          docker pull "$IMAGE:$TAG"
          docker tag "$IMAGE:$TAG" "$IMAGE:main"
          docker tag "$IMAGE:$TAG" "$IMAGE:latest"

          docker push "$IMAGE:main"
          docker push "$IMAGE:latest"