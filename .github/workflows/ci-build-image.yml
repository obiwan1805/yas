name: "CI - Build Docker image by branch"

on:
  push:
    branches:
      - "**"
    paths:
      - "backoffice-bff/**"
      - "backoffice/**"
      - "cart/**"
      - "customer/**"
      - "delivery/**"
      - "inventory/**"
      - "location/**"
      - "media/**"
      - "order/**"
      - "payment/**"
      - "payment-paypal/**"
      - "product/**"
      - "promotion/**"
      - "rating/**"
      - "recommendation/**"
      - "sampledata/**"
      - "search/**"
      - "storefront-bff/**"
      - "storefront/**"
      - "tax/**"
      - "webhook/**"
      - "common-library/**"
      - "checkstyle/**"
      - "pom.xml"
      - ".github/workflows/actions/**"
      - ".github/workflows/ci-build-image.yml"

permissions:
  contents: write
  packages: write

env:
  GHCR_NAMESPACE: obiwan1805
  VALUES_FILE: values-dev.yaml

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backoffice-bff
            source_dir: backoffice-bff
            image_name: yas-backoffice-bff
            build_type: maven-f

          - service: backoffice
            source_dir: backoffice
            image_name: yas-backoffice
            build_type: node

          - service: cart
            source_dir: cart
            image_name: yas-cart
            build_type: maven-pl

          - service: customer
            source_dir: customer
            image_name: yas-customer
            build_type: maven-pl

          - service: delivery
            source_dir: delivery
            image_name: yas-delivery
            build_type: maven-pl

          - service: inventory
            source_dir: inventory
            image_name: yas-inventory
            build_type: maven-pl

          - service: location
            source_dir: location
            image_name: yas-location
            build_type: maven-pl

          - service: media
            source_dir: media
            image_name: yas-media
            build_type: maven-pl

          - service: order
            source_dir: order
            image_name: yas-order
            build_type: maven-pl

          - service: payment
            source_dir: payment
            image_name: yas-payment
            build_type: maven-pl

          - service: payment-paypal
            source_dir: payment-paypal
            image_name: yas-payment-paypal
            build_type: maven-pl

          - service: product
            source_dir: product
            image_name: yas-product
            build_type: maven-pl

          - service: promotion
            source_dir: promotion
            image_name: yas-promotion
            build_type: maven-pl

          - service: rating
            source_dir: rating
            image_name: yas-rating
            build_type: maven-pl

          - service: recommendation
            source_dir: recommendation
            image_name: yas-recommendation
            build_type: maven-pl

          - service: sampledata
            source_dir: sampledata
            image_name: yas-sampledata
            build_type: maven-pl

          - service: search
            source_dir: search
            image_name: yas-search
            build_type: maven-pl

          - service: storefront-bff
            source_dir: storefront-bff
            image_name: yas-storefront-bff
            build_type: maven-pl

          - service: storefront-ui
            source_dir: storefront
            image_name: yas-storefront
            build_type: node

          - service: tax
            source_dir: tax
            image_name: yas-tax
            build_type: maven-pl

          - service: webhook
            source_dir: webhook
            image_name: yas-webhook
            build_type: maven-pl

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to build this service
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          SHOULD_BUILD="false"

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || echo "$BEFORE" | grep -q '^0000000000000000000000000000000000000000$'; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$AFTER" || true)"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER" || true)"
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Nếu đổi common/shared code hoặc workflow build thì build toàn bộ service.
          if echo "$CHANGED_FILES" | grep -Eq '^(common-library/|checkstyle/|pom\.xml|\.github/workflows/actions/|\.github/workflows/ci-build-image\.yml)'; then
            SHOULD_BUILD="true"
          fi

          # Nếu đổi trực tiếp folder service này thì build service này.
          if echo "$CHANGED_FILES" | grep -q "^${{ matrix.source_dir }}/"; then
            SHOULD_BUILD="true"
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "Should build ${{ matrix.service }}: $SHOULD_BUILD"

      - name: Set up JDK 21
        if: steps.decide.outputs.should_build == 'true' && startsWith(matrix.build_type, 'maven')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 20
        if: steps.decide.outputs.should_build == 'true' && matrix.build_type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "${{ matrix.source_dir }}/package-lock.json"

      - name: Build Maven module from root pom
        if: steps.decide.outputs.should_build == 'true' && matrix.build_type == 'maven-pl'
        shell: bash
        run: |
          mvn -B clean package -pl "${{ matrix.source_dir }}" -am -DskipTests

      - name: Build Maven standalone module
        if: steps.decide.outputs.should_build == 'true' && matrix.build_type == 'maven-f'
        shell: bash
        run: |
          mvn -B clean package -f "${{ matrix.source_dir }}" -DskipTests

      - name: Build Node service
        if: steps.decide.outputs.should_build == 'true' && matrix.build_type == 'node'
        shell: bash
        working-directory: ${{ matrix.source_dir }}
        run: |
          npm ci
          npm run build

      - name: Calculate Docker tags
        if: steps.decide.outputs.should_build == 'true'
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          IMAGE="ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.image_name }}"

          {
            echo "short_sha=$SHORT_SHA"
            echo "image=$IMAGE"
            echo "tags<<EOF"
            echo "$IMAGE:$SHORT_SHA"

            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "$IMAGE:main"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Docker image tags:"
          echo "$IMAGE:$SHORT_SHA"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "$IMAGE:main"
          fi

      - name: Login to GHCR
        if: steps.decide.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.decide.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.source_dir }}
          push: true
          tags: ${{ steps.vars.outputs.tags }}

      - name: Update values-dev.yaml image tag
        if: steps.decide.outputs.should_build == 'true' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          VALUES_KEY="${{ matrix.source_dir }}"
          TAG="${{ steps.vars.outputs.short_sha }}"
          export VALUES_KEY TAG

          curl -fsSL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o /tmp/yq
          chmod +x /tmp/yq

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            /tmp/yq -i '.[strenv(VALUES_KEY)].image.tag = strenv(TAG)' "${{ env.VALUES_FILE }}"

            if git diff --quiet -- "${{ env.VALUES_FILE }}"; then
              echo "No values change for ${VALUES_KEY}"
              exit 0
            fi

            git add "${{ env.VALUES_FILE }}"
            git commit -m "chore(cd): update ${VALUES_KEY} image tag to ${TAG} [skip ci]"

            if git push origin HEAD:main; then
              echo "Updated ${{ env.VALUES_FILE }} for ${VALUES_KEY} => ${TAG}"
              exit 0
            fi

            echo "Push failed, retrying..."
            sleep $((attempt * 2))
          done

          echo "Failed to push values update after retries"
          exit 1

      - name: Print CI summary
        if: steps.decide.outputs.should_build == 'true'
        shell: bash
        run: |
          echo "## CI result for ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Service:** ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "**Docker image tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.vars.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "Built service: ${{ matrix.service }}"
          echo "Image tags:"
          echo "${{ steps.vars.outputs.tags }}"