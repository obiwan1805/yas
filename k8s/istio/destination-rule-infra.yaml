  namespace: dev
spec:
  host: kafka-cluster-kafka-brokers.kafka.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
  exportTo:
  - "."

---
# --- Keycloak (Keycloak Operator v2) ---
# Service: keycloak-service.keycloak.svc.cluster.local:8080
# Identity endpoint used by all backend services for JWT validation.
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: keycloak-disable-tls
  namespace: dev
spec:
  host: keycloak-service.keycloak.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
  exportTo:
  - "."

---
# --- OpenTelemetry Collector ---
# Service: opentelemetry-collector.observability.svc.cluster.local:4318
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: otel-collector-disable-tls
  namespace: dev
spec:
  host: opentelemetry-collector.observability.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
  exportTo:
  - "."
