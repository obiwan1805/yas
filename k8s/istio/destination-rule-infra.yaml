# ============================================================
# DestinationRule — Disable mTLS for Infrastructure Services
# ============================================================
# Infrastructure services (PostgreSQL, Kafka, Keycloak,
# OpenTelemetry Collector) run WITHOUT Istio sidecars.
# When a sidecar-injected pod in dev calls these services,
# Envoy must send plain TCP/HTTP (tls.mode: DISABLE) instead
# of the ISTIO_MUTUAL that mesh-wide-mtls destination rule
# would otherwise enforce.
#
# These rules live in the dev namespace and are exported
# only within dev (exportTo: ".").
# ============================================================

# --- PostgreSQL (Zalando postgres-operator) ---
# Service: postgresql.postgres.svc.cluster.local:5432
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: postgresql-disable-tls
  namespace: dev
spec:
  host: postgresql.postgres.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
  exportTo:
  - "."

---
# --- Kafka bootstrap (Strimzi) ---
# Service: kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
apiVersion: networking.istio.io/v1beta1
