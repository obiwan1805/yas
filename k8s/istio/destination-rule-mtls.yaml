# ============================================================
# DestinationRule — Enforce ISTIO_MUTUAL mTLS for Mesh Traffic
# ============================================================
# Ensures that Envoy sidecars use Istio mutual TLS certificates
# (ISTIO_MUTUAL) when calling any service inside the dev namespace.
# destination-rule-infra.yaml overrides this for infra hosts
# because more-specific rules (FQDN match) take precedence over
# the wildcard match used here.
# ============================================================

# --- Mesh-wide ISTIO_MUTUAL for all *.dev.svc.cluster.local hosts ---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: mesh-wide-mtls
  namespace: dev
spec:
  host: "*.dev.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
  exportTo:
  - "."

---
# --- Per-service rules with outlier detection ---
# Cap retries and eject misbehaving upstreams to prevent cascading failures.

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: product-dr
  namespace: dev
spec:
  host: product
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    outlierDetection:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

