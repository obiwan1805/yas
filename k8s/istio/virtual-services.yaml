# ============================================================
# VirtualService — Retry & Timeout Policy for YAS Services
# ============================================================
# Retry policy (applied to ALL services):
#   attempts:      3
#   perTryTimeout: 2s
#   retryOn:       5xx, gateway-error, connect-failure, retriable-4xx
#
# Timeouts are tuned per service type:
#   BFF aggregators  → 30s  (fan-out to multiple backends)
#   Order service    → 15s  (multi-step saga: cart, product, tax, inventory)
#   Product/Search   → 10s  (potential DB + media calls)
#   Everything else  →  5s  (single-step lookups)
# ============================================================

# ---- storefront-bff -----------------------------------------
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: storefront-bff-vs
  namespace: dev
spec:
  hosts:
  - storefront-bff
  http:
  - timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: "5xx,gateway-error,connect-failure,retriable-4xx"
    route:
    - destination:
        host: storefront-bff
        port:
          number: 80

---
