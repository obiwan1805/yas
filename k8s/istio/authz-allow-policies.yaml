  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/storefront-bff"
    to:
    - operation:
        methods: ["GET"]
        paths: ["/api/customers*"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/backoffice-bff"
    to:
    - operation:
        methods: ["GET", "PUT", "POST", "DELETE", "PATCH"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/order"
    to:
    - operation:
        methods: ["GET"]

---
# ---- order --------------------------------------------------
# Receives calls from:
