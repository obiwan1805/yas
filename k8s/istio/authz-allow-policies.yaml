# ============================================================
# AuthorizationPolicy — Per-Service Allow Rules for YAS
# ============================================================
# Authorization matrix implemented below.
# Organised one policy per DESTINATION SERVICE for clarity.
#
# Service principals follow the SPIFFE format:
#   cluster.local/ns/<namespace>/sa/<serviceaccount>
#
# Service accounts are named identically to their Helm
# fullnameOverride (e.g. cart → sa/cart, product → sa/product).
#
# Communication map:
#   storefront-ui  → storefront-bff
#   storefront-bff → product, cart, customer, order, tax, search, media
#   backoffice-ui  → backoffice-bff
#   backoffice-bff → product, inventory, order, customer, media, tax
#   product        → media, tax, search
#   cart           → product, tax
#   order          → cart, product, customer, tax, inventory
#   inventory      → product
#   tax            → (none)
#   search         → (none)
#   media          → (none)
#
# payment and payment-paypal are excluded (skip-reconcile /
# CrashLoopBackOff — see apps-dev.yaml annotations).
# ============================================================

# ---- storefront-bff -----------------------------------------
# Receives calls from: storefront-ui (server-side rendering)
# Also receives traffic from nginx-ingress (port 80 is PERMISSIVE
# via PeerAuthentication — see peer-authentication.yaml).
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-storefront-bff
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-bff
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/storefront-ui"

---
# ---- backoffice-bff -----------------------------------------
# Receives calls from: backoffice-ui (server-side rendering)
# Also receives traffic from nginx-ingress (port 80 is PERMISSIVE).
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-backoffice-bff
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backoffice-bff
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/backoffice-ui"

---
# ---- product ------------------------------------------------
# Receives calls from:
#   storefront-bff → GET /api/products*
#   backoffice-bff → GET/PUT/POST *
#   cart           → GET *
#   order          → GET *
#   inventory      → GET *
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-product
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/storefront-bff"
    to:
    - operation:
        methods: ["GET"]
        paths: ["/api/products*"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/backoffice-bff"
    to:
    - operation:
        methods: ["GET", "PUT", "POST", "DELETE", "PATCH"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/cart"
        - "cluster.local/ns/dev/sa/order"
        - "cluster.local/ns/dev/sa/inventory"
    to:
    - operation:
        methods: ["GET"]

---
# ---- cart ---------------------------------------------------
# Receives calls from:
#   storefront-bff → GET/POST /api/carts*
#   order          → GET/DELETE *
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-cart
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cart
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/storefront-bff"
    to:
    - operation:
        methods: ["GET", "POST"]
        paths: ["/api/carts*"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/order"
    to:
    - operation:
        methods: ["GET", "DELETE"]

---
