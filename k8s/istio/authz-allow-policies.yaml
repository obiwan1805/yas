spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: order
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/storefront-bff"
    to:
    - operation:
        methods: ["GET", "POST"]
        paths: ["/api/orders*"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/backoffice-bff"
    to:
    - operation:
        methods: ["GET", "PUT", "POST", "PATCH"]

---
# ---- inventory ----------------------------------------------
# Receives calls from:
#   backoffice-bff → GET/PUT *
#   order          → PUT *
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-inventory
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/backoffice-bff"
    to:
    - operation:
        methods: ["GET", "PUT", "POST", "PATCH"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/order"
    to:
    - operation:
        methods: ["GET", "PUT"]

---
# ---- tax ----------------------------------------------------
# Receives calls from:
#   storefront-bff → GET /api/taxes*
#   backoffice-bff → GET *
#   product        → GET *
#   cart           → GET *
#   order          → GET *
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-tax
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tax
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/storefront-bff"
    to:
    - operation:
        methods: ["GET"]
        paths: ["/api/taxes*"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/backoffice-bff"
        - "cluster.local/ns/dev/sa/product"
        - "cluster.local/ns/dev/sa/cart"
        - "cluster.local/ns/dev/sa/order"
    to:
    - operation:
        methods: ["GET"]

---
# ---- search -------------------------------------------------
# Receives calls from:
#   storefront-bff → GET /api/search*
#   product        → GET *
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-search
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: search
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/storefront-bff"
    to:
    - operation:
        methods: ["GET"]
        paths: ["/api/search*"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/product"
    to:
    - operation:
        methods: ["GET"]

---
# ---- media --------------------------------------------------
# Receives calls from:
#   product        → GET *
#   storefront-bff → GET *  (product images in storefront)
#   backoffice-bff → GET/PUT/POST/DELETE *  (media management)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-to-media
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: media
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/product"
        - "cluster.local/ns/dev/sa/storefront-bff"
    to:
    - operation:
        methods: ["GET"]
  - from:
    - source:
        principals:
        - "cluster.local/ns/dev/sa/backoffice-bff"
    to:
    - operation:
        methods: ["GET", "PUT", "POST", "DELETE", "PATCH"]

---
# ---- health-check allow for Kubernetes probes ---------------
# Enable when pods stay 1/2 or CrashLoop after deny-all (probe 403).
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-health-checks
  namespace: dev
spec:
  action: ALLOW
  rules:
  - to:
    - operation:
        paths: ["/actuator/health*"]
        methods: ["GET"]
