apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backoffice-bff-staging
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/obiwan1805/yas.git
    targetRevision: HEAD
    path: k8s/charts/backoffice-bff
    helm:
      valueFiles:
      - values.yaml
      - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
